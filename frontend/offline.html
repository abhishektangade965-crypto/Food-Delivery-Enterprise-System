<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivo OS - Offline Fallback</title>
    <style>
        body {
            background-color: #0B0E14;
            color: #FFFFFF;
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            background: #131722;
            border: 1px solid #1E2330;
            padding: 40px;
            border-radius: 12px;
            max-width: 400px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }
        .icon {
            font-size: 48px;
            color: #FF2A54;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 22px;
            margin-bottom: 10px;
        }
        p {
            font-size: 13px;
            color: #8E9AA8;
            line-height: 1.5;
            margin-bottom: 25px;
        }
        .btn {
            background: #FF2A54;
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⚡</div>
        <h1>Connection Offline</h1>
        <p>Your browser is currently disconnected. Delivo cached pages are offline, but you can retry loading once your network recovers.</p>
        <button class="btn" onclick="window.location.reload()">Retry Connection</button>
    </div>
</body>
</html>
