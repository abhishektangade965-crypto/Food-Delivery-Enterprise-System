    <!-- Backdrop Overlay -->
    <div class="backdrop-tint" id="cart-backdrop"></div>

    <!-- Right Side Cart Slider -->
    <div class="cart-slideout" id="cart-slideout" role="dialog" aria-modal="true" aria-label="Shopping Cart">
        <div class="cart-slideout-header">
            <h3>Shopping Checkout Cart</h3>
            <button class="header-btn" id="btn-close-cart" aria-label="Close Cart">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        
        <div class="cart-slideout-body" id="cart-items-list-container">
            <div style="font-size: 13px; color: var(--text-muted); text-align: center; margin-top: 50px;">Your checkout cart is empty.</div>
        </div>

        <div class="cart-slideout-footer">
            <div class="split-bill-section" style="margin-bottom: 15px; border-bottom: 1px dashed var(--border); padding-bottom: 15px;">
                <h5 style="margin-bottom: 8px;">Split Bill Calculator</h5>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <label for="split-bill-members" style="font-size: 11px;">Members: </label>
                    <input type="number" id="split-bill-members" class="input-field" value="1" min="1" max="20" step="1" style="width: 60px; padding: 2px 5px; margin: 0;">
                    <span style="font-size: 11px; font-weight: 700; color: var(--secondary);">Each Pays: </span>
                    <span id="split-bill-amount" style="font-size: 13px; font-weight: 700;">$0.00</span>
                </div>
            </div>

            <!-- Schedule & Group Order Actions -->
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button class="header-btn" onclick="openSchedulerModal()" style="flex-grow: 1; margin: 0; padding: 8px; font-size: 11px; display: flex; align-items: center; justify-content: center; gap: 6px;">
                    <i class="fa-solid fa-clock"></i> Schedule
                </button>
                <button class="header-btn" onclick="openGroupModal()" style="flex-grow: 1; margin: 0; padding: 8px; font-size: 11px; display: flex; align-items: center; justify-content: center; gap: 6px;">
                    <i class="fa-solid fa-users"></i> Group Order
                </button>
            </div>
            
            <div id="cart-schedule-status" style="display: none; font-size: 10px; color: var(--secondary); text-align: center; margin-bottom: 10px; font-weight: 700;"></div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <span>Total Items Subtotal:</span>
                <span id="cart-slide-subtotal" style="font-weight: 700;">$0.00</span>
            </div>
            
            <button class="btn-submit-order" id="btn-checkout-now" style="width: 100%;">Checkout Now</button>
        </div>
    </div>
