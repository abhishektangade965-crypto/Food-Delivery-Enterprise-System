apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: user-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/delivo/food-delivery-super-platform.git'
    targetRevision: HEAD
    path: infrastructure/helm
    helm:
      valueFiles:
        - values.yaml
      parameters:
        - name: image.repository
          value: food-delivery/user-service
        - name: service.port
          value: '8001'
        - name: envFromConfigMap
          value: global-config
        - name: envFromSecret
          value: global-secrets
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: food-delivery-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
