server:
  port: 8006
  servlet:
    context-path: /

spring:
  application:
    name: notification-service
  profiles:
    active: default
  datasource:
    url: jdbc:postgresql://localhost:5432/notificationdb
    username: notificationservice
    password: notificationpassword123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
      password: redispassword123
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: notification-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

notification-service:
  max-retries: 3
  backoff-ms: 1000
  templates:
    user-created:
      title: "Welcome to Delivo OS!"
      body: "Hi! Your account with email {email} has been successfully created. Welcome aboard!"
    order-placed:
      title: "Order Placed Successfully"
      body: "Hi customer! Your order {orderId} for amount {amount} is placed and status is {status}."
    driver-assigned:
      title: "Delivery Partner Assigned"
      body: "Your order {orderId} has been assigned to delivery partner {driverName}. Delivery status is {status}."
    order-delivered:
      title: "Order Delivered"
      body: "Your order {orderId} has been delivered. Enjoy your food!"
    payment-failed:
      title: "Payment Failed"
      body: "Payment for order {orderId} failed. Please try again. Status: {status}."
    payment-completed:
      title: "Payment Completed"
      body: "Payment for order {orderId} has been successfully processed. Status: {status}."

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
