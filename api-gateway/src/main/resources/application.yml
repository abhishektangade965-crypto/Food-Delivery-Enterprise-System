        automatic-transition-from-open-to-half-open-enabled: true
      analyticsServiceCB:
        sliding-window-size: 20
        failure-rate-threshold: 60
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
      reportingServiceCB:
        sliding-window-size: 10
        failure-rate-threshold: 60
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      adminServiceCB:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
      auditServiceCB:
        sliding-window-size: 20
        failure-rate-threshold: 60
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
      configServiceCB:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
      featureFlagServiceCB:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
      wsTrackingCB:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true

  timelimiter:
    instances:
      orderServiceCB:
        timeout-duration: 30s
        cancel-running-future: true
      paymentServiceCB:
        timeout-duration: 30s
        cancel-running-future: true
      reportingServiceCB:
        timeout-duration: 60s
        cancel-running-future: true

# ─── Actuator / Management ─────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway,circuitbreakers,loggers,env
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      group:
        readiness:
          include: redis, diskSpace
        liveness:
          include: ping
    gateway:
      enabled: true
  health:
    circuitbreakers:
      enabled: true
    ratelimiters:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
        spring.cloud.gateway.requests: true
      slo:
        http.server.requests: 1ms, 5ms, 10ms, 50ms, 100ms, 500ms, 1s, 5s
    tags:
      application: ${spring.application.name}
      environment: ${ENVIRONMENT:local}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
    metrics:
      export:
        enabled: true
        url: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:http://localhost:4318/v1/metrics}

# ─── OpenTelemetry ─────────────────────────────────────────────────────────────
otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}
      timeout: 10s
  resource:
    attributes:
      service.name: api-gateway
      service.version: 1.0.0
      deployment.environment: ${ENVIRONMENT:local}

# ─── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.fooddelivery.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
    org.springframework.security: WARN
    io.lettuce.core: WARN
    reactor.netty: WARN
    org.springframework.web.reactive: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}/%X{spanId}] %-5level %logger{36} - %msg%n"
  config: classpath:logback-spring.xml

# ─── Gateway application-specific properties ──────────────────────────────────
gateway:
  jwt:
    jwk-set-uri: ${JWK_SET_URI:http://localhost:8081/api/v1/auth/jwks}
  rate-limit:
    anonymous:
      replenish-rate: 10
      burst-capacity: 20
    authenticated:
      replenish-rate: 100
      burst-capacity: 200
    premium:
      replenish-rate: 1000
      burst-capacity: 2000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://app.fooddelivery.com}
  security:
    admin-roles: ROLE_ADMIN, ROLE_SUPER_ADMIN
    public-paths:
      - /api/v1/users/register
      - /api/v1/users/login
      - /api/v1/users/refresh-token
      - /api/v1/users/forgot-password
      - /api/v1/users/reset-password
      - /api/v1/auth/**
      - /actuator/health/**
      - /actuator/info
      - /swagger-ui/**
      - /v3/api-docs/**
      - /webjars/**
      - /favicon.ico
      - /ws/**
