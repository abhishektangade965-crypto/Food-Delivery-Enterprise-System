server:
  port: 8080
  netty:
    connection-timeout: 10s
    idle-timeout: 60s
  http2:
    enabled: true

spring:
  application:
    name: api-gateway

  # ─── Redis (for rate limiter) ─────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 5
          max-wait: 1000ms

  # ─── JWT RS256 Resource Server ────────────────────────────────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWK_SET_URI:http://localhost:8081/api/v1/auth/jwks}
          issuer-uri: ${JWT_ISSUER_URI:https://auth.fooddelivery.com}

  # ─── Spring Cloud Gateway ─────────────────────────────────────────────────
  cloud:
    gateway:
      # Global CORS configuration
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "https://*.fooddelivery.com"
              - "http://localhost:[*]"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            exposedHeaders:
              - X-Correlation-ID
              - X-Request-ID
              - X-RateLimit-Remaining
              - X-RateLimit-Burst-Capacity
            allowCredentials: true
            maxAge: 3600

      # Default filters applied to ALL routes
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 100
            redis-rate-limiter.burstCapacity: 200
            redis-rate-limiter.requestedTokens: 1
            key-resolver: "#{@userKeyResolver}"
        - name: SecureHeaders
        - name: DedupeResponseHeader
          args:
            name: Access-Control-Allow-Credentials Access-Control-Allow-Origin
            strategy: RETAIN_UNIQUE
        - AddResponseHeader=X-Content-Type-Options, nosniff
        - AddResponseHeader=X-Frame-Options, DENY
        - AddResponseHeader=X-XSS-Protection, 1; mode=block
        - AddResponseHeader=Referrer-Policy, strict-origin-when-cross-origin
        - AddResponseHeader=Permissions-Policy, "geolocation=(), microphone=(), camera=()"

      # Metric tags for observability
      metrics:
        enabled: true
        tags:
          path:
            enabled: true

      # HttpClient tuning
      httpclient:
        connect-timeout: 5000
        response-timeout: 30s
        pool:
          type: ELASTIC
          max-idle-time: 15s
          max-life-time: 60s
        compression: true

      routes:
        # ── 1. User Service ────────────────────────────────────────────────
        - id: user-service-public
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/register, /api/v1/users/login, /api/v1/users/refresh-token, /api/v1/users/forgot-password, /api/v1/users/reset-password, /api/v1/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: userServiceCB
                fallbackUri: forward:/fallback/user-service
            - name: Retry
              args:
                retries: 2
                statuses: BAD_GATEWAY,GATEWAY_TIMEOUT,SERVICE_UNAVAILABLE
                methods: GET
                backoff:
                  firstBackoff: 50ms
                  maxBackoff: 500ms
                  factor: 2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                key-resolver: "#{@ipKeyResolver}"
          metadata:
            connect-timeout: 5000
            response-timeout: 10000

        - id: user-service-private
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**
          filters:
            - name: CircuitBreaker
              args:
                name: userServiceCB
                fallbackUri: forward:/fallback/user-service
            - name: Retry
              args:
                retries: 2
                statuses: BAD_GATEWAY,GATEWAY_TIMEOUT,SERVICE_UNAVAILABLE
                methods: GET
                backoff:
                  firstBackoff: 50ms
                  maxBackoff: 500ms
                  factor: 2
          metadata:
            connect-timeout: 5000
            response-timeout: 15000

        # ── 2. Restaurant Service ──────────────────────────────────────────
        - id: restaurant-service
          uri: lb://restaurant-service
          predicates:
            - Path=/api/v1/restaurants/**
          filters:
            - name: CircuitBreaker
              args:
                name: restaurantServiceCB
                fallbackUri: forward:/fallback/restaurant-service
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY,GATEWAY_TIMEOUT,SERVICE_UNAVAILABLE
                methods: GET
                backoff:
                  firstBackoff: 50ms
